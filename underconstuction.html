<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Ajura Store - Under Construction</title>
    <style>
        /* Reset basic styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Basic page styling */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #fff;
            color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            line-height: 1.5;
        }

        /* Container styling */
        .container {
            background-color: #f8f8f8;
            border-radius: 20px;
            padding: 40px 50px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 650px;
            text-align: center;
            transition: all 0.3s ease-in-out;
        }

        .container:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
        }

        /* Title styling */
        h1 {
            font-size: 3.2rem;
            margin-bottom: 30px;
            font-weight: 700;
            color: #333;
            letter-spacing: 1px;
        }

        /* Paragraph styling */
        p {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* Loader (spinner) styling */
        .loader {
            border: 6px solid #ddd;
            border-top: 6px solid #333;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            margin: 30px auto;
            animation: spin 1.2s linear infinite;
        }

        /* Keyframes for the spinner animation */
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* Footer styling */
        footer {
            margin-top: 30px;
            font-size: 1rem;
            color: #999;
        }

        /* Responsive layout for small screens */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.8rem;
                margin-bottom: 25px;
            }

            p {
                font-size: 1.1rem;
                margin-bottom: 35px;
            }

            .loader {
                width: 60px;
                height: 60px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px 30px;
            }

            h1 {
                font-size: 2.2rem;
                margin-bottom: 20px;
            }

            p {
                font-size: 1rem;
                margin-bottom: 25px;
            }

            .loader {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Under Construction</h1>
        <div class="loader"></div>
        <p>We are currently working on something special. Stay tuned for updates and check back soon!</p>
        <footer>
            &copy; 2025 Ajura Store. All rights reserved.
        </footer>
    </div>
</body>
</html>
