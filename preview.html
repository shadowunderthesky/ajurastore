<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Preview</title>   <link rel="icon" href="ajurastorelogo (1).webp" type="image/png">
    <style>
        /* Yleiset tyylit */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #212529;
            line-height: 1.6;
        }

        /* Header-tyylit */
        header {
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 1.8rem;
            margin: 0;
        }

        .back-button {
            background-color: #fff;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background-color: #000;
            color: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        /* Esikatselualueen tyylit */
        .preview-container {
            padding: 20px;
            text-align: center;
        }

        .preview-container p {
            font-size: 1rem;
            color: #6c757d;
        }

        iframe {
            border: 1px solid #ddd;
            border-radius: 5px;
            width: 100%;
            max-width: 1200px;
            height: 80vh;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        /* Footer-tyylit */
        footer {
            background-color: #f1f1f1;
            color: #6c757d;
            padding: 10px;
            text-align: center;
            font-size: 0.9rem;
            position: relative;
            bottom: 0;
            width: 100%;
        }

        footer a {
            color: #000;
            text-decoration: none;
            font-weight: bold;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<header>
    <h1>Template Preview</h1>
    <a href="index.html" class="back-button">Back to Home</a>
</header>

<div class="preview-container">
    <p>Below is a live preview of the selected template. Use the "Back to Home" button to return to the main page.</p>
    <iframe src="about.html"></iframe>
</div>

<footer>
    <p>&copy; 2025 Ajura Store. <a href="contact.html">Contact us</a> for more information.</p>
</footer>

</body>
</html>
