<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>   <link rel="icon" href="ajurastorelogo (1).webp" type="image/png">
    <style>
        /* General Styles */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff;
            color: #333;
        }

        header {
            background-color: #111;
            color: white;
            padding: 20px 30px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: bold;
        }

        /* Cart Container */
        .cart-container {
            max-width: 1200px;
            margin: 30px auto;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 20px;
            border: 1px solid #eee;
        }

        /* Cart Item */
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f1f1f1;
        }

        .cart-item img {
            width: 120px;
            height: auto;
            border-radius: 8px;
        }

        .cart-item-details {
            flex-grow: 1;
            padding: 0 20px;
        }

        .cart-item-details h3 {
            font-size: 1.5rem;
            margin: 0;
            font-weight: bold;
        }

        .cart-item-details p {
            margin: 5px 0;
            color: #777;
            font-size: 1.1rem;
        }

        .remove-btn {
            background-color: #111;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s, transform 0.3s;
        }

        .remove-btn:hover {
            background-color: #333;
            transform: scale(1.05);
        }

        /* Total Price Box */
        .total-price-box {
            background-color: #111;
            color: white;
            padding: 25px;
            font-size: 1.6rem;
            font-weight: bold;
            margin-top: 30px;
            text-align: right;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .total-price-box p {
            margin: 0;
            font-size: 1.8rem;
        }

        /* Buttons */
        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .checkout-btn,
        .back-to-home-btn {
            background-color: #111;
            color: white;
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
            width: 48%;
        }

        .checkout-btn:hover,
        .back-to-home-btn:hover {
            background-color: #333;
            transform: scale(1.05);
        }

        .back-to-home-btn {
            background-color: #28a745;
        }

        .back-to-home-btn:hover {
            background-color: #218838;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .cart-container {
                margin: 20px;
                padding: 10px;
            }

            .cart-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .cart-item-details {
                padding: 0;
                margin-bottom: 10px;
            }

            .total-price-box {
                font-size: 1.4rem;
            }

            .buttons {
                flex-direction: column;
            }

            .checkout-btn,
            .back-to-home-btn {
                width: 100%;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Shopping Cart</h1>
</header>

<!-- Cart Container -->
<div class="cart-container">
    <!-- Total Price Box -->
    <div class="total-price-box">
        <p>Total: <span id="total-price">$119.97</span></p>
    </div>

    <!-- Cart Items (Dynamic Content) -->
    <div class="cart-item" id="item1">
        <img src="template1.jpg" alt="Template 1">
        <div class="cart-item-details">
            <h3>Template 1</h3>
            <p>Price: $39.99</p>
        </div>
        <div class="item-actions">
            <button class="remove-btn" onclick="removeItem(1)">Remove</button>
        </div>
    </div>

    <div class="cart-item" id="item2">
        <img src="template2.jpg" alt="Template 2">
        <div class="cart-item-details">
            <h3>Template 2</h3>
            <p>Price: $29.99</p>
        </div>
        <div class="item-actions">
            <button class="remove-btn" onclick="removeItem(2)">Remove</button>
        </div>
    </div>

    <div class="cart-item" id="item3">
        <img src="template3.jpg" alt="Template 3">
        <div class="cart-item-details">
            <h3>Template 3</h3>
            <p>Price: $49.99</p>
        </div>
        <div class="item-actions">
            <button class="remove-btn" onclick="removeItem(3)">Remove</button>
        </div>
    </div>

    <!-- Buttons -->
    <div class="buttons">
        <button class="checkout-btn" onclick="window.location.href='checkout.html'">Proceed to Checkout</button>
        <button class="back-to-home-btn" onclick="window.location.href='index.html'">Back to Home</button>
    </div>
</div>

<script>
    let totalPrice = 119.97;

    // Function to remove items and update total price
    function removeItem(itemNumber) {
        let itemPrice = 0;
        switch (itemNumber) {
            case 1:
                itemPrice = 39.99;
                document.getElementById('item1').remove();
                break;
            case 2:
                itemPrice = 29.99;
                document.getElementById('item2').remove();
                break;
            case 3:
                itemPrice = 49.99;
                document.getElementById('item3').remove();
                break;
        }

        totalPrice -= itemPrice;
        updateTotalPrice();
    }

    // Function to update total price dynamically
    function updateTotalPrice() {
        document.getElementById('total-price').innerText = `$${totalPrice.toFixed(2)}`;
    }
</script>

</body>
</html>
