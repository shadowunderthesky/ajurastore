<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="icon" href="ajurastorelogo (1).webp" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #fff;
            color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            flex-direction: column;
        }

        /* Splash Screen */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
            opacity: 1;
            transition: opacity 1s ease-out;
        }

        .splash-screen img {
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
        }

        .splash-screen h2 {
            font-size: 24px;
            color: #000;
        }

        /* Main Form */
        .sign-in-container {
            display: none;
            background-color: #fff;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border: 2px solid #000;
            animation: fadeInUp 0.6s ease-out;
        }

        .sign-in-container h2 {
            font-size: 36px;
            font-weight: bold;
            color: #000;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #000;
            border-radius: 6px;
            font-size: 16px;
            color: #000;
            background-color: #f4f4f4;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #333;
            background-color: #fff;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #000;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #444;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .sign-in-container {
                padding: 30px;
                max-width: 320px;
            }

            .submit-btn {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div class="splash-screen" id="splashScreen">
        <img src="ajurastorelogo (1).webp" alt="Ajura Logo">
        <h2>Welcome to Ajura!</h2>
    </div>

    <!-- Sign In Form -->
    <div class="sign-in-container" id="signInForm">
        <h2>Sign In</h2>
        <form action="#" method="POST" onsubmit="handleSubmit(event)">
            <input type="email" class="input-field" placeholder="Email" required>
            <input type="password" class="input-field" placeholder="Password" required>
            <button type="submit" class="submit-btn">Sign In</button>
        </form>
    </div>

    <script>
        // Function to handle form submission
        function handleSubmit(event) {
            event.preventDefault(); // Prevent default form submission

            // Hide sign-in form and show splash screen (for demo purposes)
            document.getElementById('signInForm').style.display = 'none';
            document.getElementById('splashScreen').style.opacity = 1;

            // Wait for 3 seconds before hiding splash screen and showing the main form
            setTimeout(() => {
                document.getElementById('splashScreen').style.opacity = 0;
                document.getElementById('signInForm').style.display = 'block';
            }, 3000); // 3 seconds delay
        }

        // Automatically show the sign-in form after splash screen
        window.onload = function() {
            document.getElementById('signInForm').style.display = 'block';
        }
    </script>

</body>
</html>
