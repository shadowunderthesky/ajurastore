<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Consent</title>   <link rel="icon" href="ajurastorelogo (1).webp" type="image/png">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }

        /* Suostumusilmoitus */
        .cookie-consent {
            position: fixed;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            background-color: #222;
            color: #fff;
            padding: 25px;
            text-align: center;
            width: 80%;
            max-width: 480px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            z-index: 9999;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .cookie-consent h3 {
            font-size: 20px;
            margin: 0;
            font-weight: 600;
        }

        .cookie-consent p {
            margin: 10px 0;
            font-size: 14px;
        }

        /* Ei-interaktiivinen Essential Cookies */
        .essential-cookies {
            font-size: 16px;
            margin-top: 20px;
            color: #ccc;
        }

        /* Toggle switch */
        .cookie-options {
            margin-top: 20px;
            font-size: 14px;
            text-align: left;
            max-width: 350px;
            margin: 20px auto;
        }

        .cookie-options label {
            display: block;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .cookie-options input {
            display: none;
        }

        .cookie-options .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .cookie-options .switch input:checked + .slider {
            background-color: #4CAF50;
        }

        .cookie-options .switch input:checked + .slider:before {
            transform: translateX(26px);
        }

        .cookie-options .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.4s;
            border-radius: 34px;
        }

        .cookie-options .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            border-radius: 50%;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.4s;
        }

        /* Napit */
        .cookie-consent .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
        }

        .cookie-consent .buttons button {
            background-color: #fff;
            color: #222;
            border: 1px solid #444;
            padding: 12px 25px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 25px;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        .cookie-consent .buttons button:hover {
            background-color: #444;
            color: #fff;
            transform: translateY(-2px);
        }

        .cookie-consent .buttons button:active {
            transform: translateY(0);
        }

        /* Responsiivisuus */
        @media (max-width: 600px) {
            .cookie-consent {
                width: 90%;
                padding: 20px;
            }

            .cookie-consent h3 {
                font-size: 18px;
            }

            .cookie-consent p {
                font-size: 13px;
            }
        }

    </style>
</head>
<body>

    <!-- Suostumusilmoitus -->
    <div class="cookie-consent" id="cookie-consent">
        <h3>We use cookies to improve your experience</h3>
        <p>By using our site, you agree to our use of cookies. You can manage your preferences below.</p>

        <!-- Essential Cookies, ei interaktiivinen -->
        <div class="essential-cookies">
            Essential Cookies (Required) - Cannot be turned off
        </div>

        <!-- Evästeiden valintakenttä -->
        <div class="cookie-options">
            <label>
                Analytics Cookies
                <div class="switch">
                    <input type="checkbox" id="analytics-cookies">
                    <span class="slider"></span>
                </div>
            </label>
            <label>
                Marketing Cookies
                <div class="switch">
                    <input type="checkbox" id="marketing-cookies">
                    <span class="slider"></span>
                </div>
            </label>
        </div>

        <!-- Toimintanapit -->
        <div class="buttons">
            <button onclick="acceptCookies()">Accept All</button>
            <button onclick="rejectCookies()">Reject All</button>
            <button onclick="savePreferences()">Save Preferences</button>
        </div>
    </div>

    <script>
        // Funktio evästeiden hyväksymiselle
        function acceptCookies() {
            localStorage.setItem('cookiesAccepted', 'true');
            document.getElementById('cookie-consent').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('cookie-consent').style.display = 'none';
            }, 300);
        }

        // Funktio evästeiden hylkäämiselle
        function rejectCookies() {
            localStorage.setItem('cookiesAccepted', 'false');
            document.getElementById('cookie-consent').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('cookie-consent').style.display = 'none';
            }, 300);
        }

        // Funktio evästeiden mieltymyksille
        function savePreferences() {
            const essential = true; // Always true, as essential cookies cannot be toggled
            const analytics = document.getElementById('analytics-cookies').checked;
            const marketing = document.getElementById('marketing-cookies').checked;

            localStorage.setItem('cookiesAccepted', JSON.stringify({
                essential,
                analytics,
                marketing
            }));

            document.getElementById('cookie-consent').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('cookie-consent').style.display = 'none';
            }, 300);
        }

        // Tarkistetaan onko evästeet hyväksytty aiemmin
        if (localStorage.getItem('cookiesAccepted') === 'true' || localStorage.getItem('cookiesAccepted') === 'false') {
            document.getElementById('cookie-consent').style.display = 'none';
        }
    </script>

</body>
</html>
