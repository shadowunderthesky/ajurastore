<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #fff;
            color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .sign-in-container {
            background-color: #fff;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border: 2px solid #000;
        }

        .sign-in-container h2 {
            font-size: 36px;
            font-weight: bold;
            color: #000;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #000;
            border-radius: 6px;
            font-size: 16px;
            color: #000;
            background-color: #f4f4f4;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #333;
            background-color: #fff;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #000;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #444;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="sign-in-container">
        <h2>Sign In</h2>
        <form id="signInForm">
            <input type="text" id="username" class="input-field" placeholder="Username or Email" required>
            <input type="password" id="password" class="input-field" placeholder="Password" required>
            <button type="submit" class="submit-btn">Sign In</button>
        </form>
        <p class="error" id="errorMessage"></p>
    </div>

    <script>
        // Inline JSON data for users with roles
        const users = [
            { "username": "User", "password": "password", "role": "user" },
            { "username": "letlotlo", "password": "futurewife", "role": "lawyer" },
            { "username": "admin", "password": "adminpassword", "role": "admin" }
        ];

        const form = document.getElementById('signInForm');
        const errorMessage = document.getElementById('errorMessage');

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Check credentials
            const user = users.find(user => user.username === username && user.password === password);

            if (user) {
                // Save user details to localStorage
                localStorage.setItem('username', user.username);
                localStorage.setItem('role', user.role);

                // Redirect to animation page
                window.location.href = 'animation-start.html';
            } else {
                errorMessage.textContent = 'Invalid username or password.';
            }
        });
    </script>
</body>
</html>
