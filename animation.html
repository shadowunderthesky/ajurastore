<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Welcome Animation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(145deg, #0d0d0d, #1a1a1a);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: #fff;
            text-align: center;
        }

        .logo-container, .welcome-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 8vw; /* Adjusted font size to scale with screen size */
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            max-width: 90%; /* Ensure logo does not overflow */
        }

        .swirl {
            position: absolute;
            width: 120px;
            height: 120px;
            border: 3px solid transparent;
            border-top-color: #fff;
            border-radius: 50%;
            animation: rotateSwirl 3s linear infinite;
            opacity: 0.2;
        }

        .swirl:nth-child(1) { width: 140px; height: 140px; animation-delay: 0s; opacity: 0.3; }
        .swirl:nth-child(2) { width: 180px; height: 180px; animation-delay: -0.5s; opacity: 0.2; }
        .swirl:nth-child(3) { width: 220px; height: 220px; animation-delay: -1s; opacity: 0.15; }

        .swirl-gradient {
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2), transparent 70%);
            border-radius: 50%;
            animation: pulse 2.5s infinite ease-in-out;
            z-index: -1;
        }

        .text {
            position: relative;
            animation: fadeIn 2s ease-in-out;
            background: linear-gradient(90deg, #ffffff, #cccccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hidden { display: none; }

        .welcome-container div {
            animation: slideIn 1.5s ease-out forwards;
            opacity: 0;
        }

        .welcome-container .greeting {
            font-size: 1em; /* Font size scaled based on the parent */
            margin-bottom: 10px;
            animation-delay: 0s;
        }

        .welcome-container .username {
            font-size: 1.2em; /* Slightly larger font size for the username */
            animation-delay: 0.5s;
            color: #f39c12;
            text-shadow: 0 5px 15px rgba(255, 165, 0, 0.8);
        }

        @keyframes rotateSwirl {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @keyframes slideIn {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Media Queries for responsive scaling */
        @media (max-width: 768px) {
            .logo-container, .welcome-container {
                font-size: 12vw; /* Slightly larger font size for tablets */
            }

            .swirl {
                width: 100px;
                height: 100px;
            }

            .swirl:nth-child(1) { width: 120px; height: 120px; }
            .swirl:nth-child(2) { width: 140px; height: 140px; }
            .swirl:nth-child(3) { width: 160px; height: 160px; }

            .welcome-container .greeting {
                font-size: 5vw; /* Greeting text scaled down for tablets */
            }

            .welcome-container .username {
                font-size: 6vw; /* Username text smaller for tablets */
            }
        }

        @media (max-width: 480px) {
            .logo-container, .welcome-container {
                font-size: 18vw; /* Smaller font for mobile devices */
            }

            .swirl {
                width: 70px;
                height: 70px;
            }

            .swirl:nth-child(1) { width: 90px; height: 90px; }
            .swirl:nth-child(2) { width: 110px; height: 110px; }
            .swirl:nth-child(3) { width: 130px; height: 130px; }

            .welcome-container .greeting {
                font-size: 10vw; /* Much smaller greeting text for small screens */
            }

            .welcome-container .username {
                font-size: 12vw; /* Smaller username text for mobile */
            }
        }
    </style>
</head>
<body>
    <div class="logo-container" id="logo">
        <div class="swirl"></div>
        <div class="swirl"></div>
        <div class="swirl"></div>
        <div class="swirl-gradient"></div>
        <div class="text">Ajura</div>
    </div>

    <div class="welcome-container hidden" id="welcome">
        <div class="greeting">Welcome</div>
        <div class="username" id="username"></div>
    </div>

    <script>
        const username = localStorage.getItem('username');
        const role = localStorage.getItem('role');

        if (!username || !role) {
            window.location.href = 'signin.html';
        } else {
            const user = { name: username, role };

            document.getElementById('username').textContent = user.name;

            setTimeout(() => {
                document.getElementById('logo').classList.add('hidden');
                document.getElementById('welcome').classList.remove('hidden');

                setTimeout(() => {
                    let dashboardURL = '';

                    switch (user.role) {
                        case 'admin':
                            dashboardURL = 'admin_dashboard.html';
                            break;
                        case 'lawyer':
                            dashboardURL = 'lawyer_dashboard.html';
                            break;
                        case 'user':
                            dashboardURL = 'dashboard.html';
                            break;
                        default:
                            dashboardURL = 'default_dashboard.html';
                    }

                    window.location.href = dashboardURL;
                }, 2000);
            }, 3000);
        }
    </script>
</body>
</html>
